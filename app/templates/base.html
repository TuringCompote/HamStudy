<!DOCTYPE html>
<html lang="en">

  <title>{% block title %}{{ APP_NAME }}{% endblock %}</title>
  <link rel="stylesheet" href="/static/tokens.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
