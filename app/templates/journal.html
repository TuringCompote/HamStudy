{% extends "base.html" %}
{% block title %}Journal — {{ APP_NAME }}{% endblock %}
{% block content %}

<nav class="crumbs"><a href="/">Dashboard</a> &rsaquo; <span class="mono">Journal</span></nav>

<div class="jr-head">
  <h1>Study journal</h1>
  <button class="btn" type="button" id="jr-write">Write today's</button>
</div>

<div class="jr-week">
  <button class="btn jr-nav" type="button" id="jr-prev" aria-label="earlier week">‹</button>
  <div class="jr-days" id="jr-days"></div>
  <button class="btn jr-nav" type="button" id="jr-next" aria-label="later week">›</button>
</div>
<div class="jr-range muted small" id="jr-range"></div>

<div id="jr-entry" class="jr-entry"></div>

{% endblock %}
{% block scripts %}<script src="/static/journal.js"></script>{% endblock %}
